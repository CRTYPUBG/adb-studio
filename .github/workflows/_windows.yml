name: Reusable Windows Build

on:
  workflow_call:
    inputs:
      configuration: { type: string, default: Release }
      artifact-name: { type: string, required: true }
      package: { type: boolean, default: false }

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with: { python-version: '3.12' }
      - run: python -m pip install --disable-pip-version-check Pillow==12.2.0
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'
          arch: win64_msvc2022_64
          cache: true
      - name: Validate repository
        run: |
          python scripts/generate_windows_icon.py .
          python scripts/update_resources.py .
          python scripts/validate_resources.py .
          python scripts/validate_version.py .
          python scripts/validate_architecture.py .
          python scripts/validate_qml_policy.py .
      - name: Configure and build
        shell: pwsh
        run: |
          $preset = "windows-msvc-${{ inputs.configuration }}".ToLowerInvariant()
          cmake --preset $preset
          cmake --build --preset $preset --parallel
      - name: Format and QML lint
        shell: pwsh
        run: |
          $sources = Get-ChildItem apps,core,tests -Recurse -Include *.cpp,*.hpp | ForEach-Object FullName
          clang-format --dry-run --Werror $sources
          $preset = "windows-msvc-${{ inputs.configuration }}".ToLowerInvariant()
          $qml = Get-ChildItem apps/studio/qml -Recurse -Filter *.qml | ForEach-Object FullName
          & "$env:QT_ROOT_DIR/bin/qmllint.exe" -I "build/$preset/core" $qml
      - name: Test
        shell: pwsh
        run: |
          $preset = "windows-msvc-${{ inputs.configuration }}".ToLowerInvariant()
          ctest --test-dir "build/$preset" -C "${{ inputs.configuration }}" --output-on-failure
      - name: Create portable package and installer
        if: inputs.package
        run: |
          choco install innosetup --yes --no-progress
          python Build.py --config "${{ inputs.configuration }}" --skip-tests
      - uses: actions/upload-artifact@v7
        if: ${{ !inputs.package }}
        with:
          name: ${{ inputs.artifact-name }}
          path: build/windows-msvc-*/${{ inputs.configuration }}/adb-studio.exe
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        if: inputs.package
        with:
          name: ${{ inputs.artifact-name }}
          path: dist/**
          if-no-files-found: error
