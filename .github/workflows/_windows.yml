name: Reusable Windows Build

on:
  workflow_call:
    inputs:
      configuration: { type: string, default: Release }
      artifact-name: { type: string, required: true }
      command: { type: string, default: build }

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with: { python-version: '3.12' }
      - run: python -m pip install --disable-pip-version-check Pillow==12.2.0
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'
          arch: win64_msvc2022_64
          cache: true
      - name: Install packaging tools
        if: contains(fromJSON('["package", "release", "nightly"]'), inputs.command)
        run: choco install innosetup --yes --no-progress
      - name: Install static analysis tools
        if: inputs.command == 'lint'
        shell: pwsh
        run: |
          choco install llvm cppcheck ninja --yes --no-progress
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          Update-SessionEnvironment
          ./scripts/install_iwyu.ps1
      - name: Run build entry point
        env:
          QTDIR: ${{ env.QT_ROOT_DIR }}
        run: python build.py "${{ inputs.command }}" --config "${{ inputs.configuration }}"
      - uses: actions/upload-artifact@v7
        if: contains(fromJSON('["build", "test", "benchmark"]'), inputs.command)
        with:
          name: ${{ inputs.artifact-name }}
          path: |
            build/windows-msvc-*/${{ inputs.configuration }}/adb-studio.exe
            dist/evidence/**
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        if: contains(fromJSON('["package", "release", "nightly"]'), inputs.command)
        with:
          name: ${{ inputs.artifact-name }}
          path: dist/**
          if-no-files-found: error
