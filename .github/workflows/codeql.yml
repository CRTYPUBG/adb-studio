name: CodeQL
on: { pull_request: {}, push: { branches: [main] }, schedule: [{ cron: '43 4 * * 2' }] }
permissions: { contents: read, security-events: write, packages: read }
jobs:
  analyze:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with: { languages: c-cpp }
      - uses: actions/setup-python@v7
        with: { python-version: '3.12' }
      - run: python -m pip install Pillow==12.2.0
      - uses: jurplel/install-qt-action@v4
        with: { version: '6.8.1', arch: win64_msvc2022_64, cache: true }
      - run: cmake --preset windows-msvc-debug
      - run: cmake --build --preset windows-msvc-debug --parallel
      - uses: github/codeql-action/analyze@v4
